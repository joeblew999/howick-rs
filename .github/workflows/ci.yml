name: CI

# Rust version pinned in rust-toolchain.toml (rustup standard).
# mise handles task running only — NOT rust installation.
# Logic lives in mise.toml ci task: check + test + fmt-check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install rust from rust-toolchain.toml (1.93.0 + rustfmt + clippy)
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          components: rustfmt,clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # mise handles tasks — rust already installed above
      - uses: jdx/mise-action@v2
        with:
          install: false   # don't install tools — rust already handled above

      - run: mise run ci
