[tools]
rust = "1.94.0"

[env]
RUST_BACKTRACE = "1"

[tasks.test]
run = "cargo test"
description = "Run all tests"

[tasks.build]
run = "cargo build"
description = "Build"

[tasks.check]
run = "cargo check && cargo clippy -- -D warnings"
description = "Check and lint"

[tasks.fmt]
run = "cargo fmt"
description = "Format code"

[tasks.fmt-check]
run = "cargo fmt --check"
description = "Check formatting (CI)"

[tasks.ci]
depends = ["check", "test", "fmt-check"]
description = "Full CI — check, test, fmt"
