# mise.toml — task runner for howick-rs
# Rust version is pinned in rust-toolchain.toml (rustup standard).
# mise respects rust-toolchain.toml automatically — do not add rust here.

[env]
RUST_BACKTRACE = "1"

# ── Dev ───────────────────────────────────────────────────────────────────────

[tasks.build]
description = "Build"
run         = "cargo build"

[tasks.check]
description = "Check + clippy -D warnings"
run         = "cargo check && cargo clippy -- -D warnings"

[tasks.fmt]
description = "Format"
run         = "cargo fmt"

[tasks."fmt-check"]
description = "Check formatting (CI)"
run         = "cargo fmt --check"

# ── Test ──────────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests (unit + e2e against factory fixtures)"
run         = "cargo test"

[tasks."test:unit"]
description = "Unit tests only"
run         = "cargo test --test integration"

[tasks."test:e2e"]
description = "E2e validation against real factory CSV files"
run         = "cargo test --test e2e_validation"

# ── CI — single source of truth ───────────────────────────────────────────────

[tasks.ci]
description = "Full CI: check + test + fmt-check"
depends     = ["check", "test", "fmt-check"]

# ── Publish ───────────────────────────────────────────────────────────────────

[tasks."publish:dry"]
description = "Dry-run publish to crates.io"
run         = "cargo publish --dry-run"

[tasks.publish]
description = "Publish to crates.io"
run         = "cargo publish"
